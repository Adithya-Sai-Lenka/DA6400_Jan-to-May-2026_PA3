name: RL_PA3
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Use Python 3.11 on Windows because Box2D/Gymnasium wheels are much less
  # painful here than on Python 3.12/3.13.
  - python=3.11
  - pip
  - setuptools
  - wheel

  # Core scientific stack
  - numpy
  - scipy
  - matplotlib
  - tqdm

  # PyTorch CPU build. For CUDA, replace these two lines with the matching
  # pytorch-cuda package from the PyTorch install selector.
  - pytorch::pytorch
  - pytorch::cpuonly

  # Gymnasium Box2D support for LunarLander-v3 on win-64.
  - swig
  - box2d-py
  - pygame

  # DeepMind Control / MuJoCo support for the Reacher section.
  - glfw
  - pyopengl
  - h5py
  - lxml

  - pip:
      - gymnasium==1.1.1
      - dm-control
      - mujoco
      - shimmy
